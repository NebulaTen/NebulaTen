<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NebulaTen</title>
<link rel="icon" href="favicon.ico" type="image/x-icon">
<script src="https://kit.fontawesome.com/b44b8a57e7.js" crossorigin="anonymous"></script>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');

  * {
    box-sizing: border-box;
  }

  html, body {
    margin: 0;
    padding: 0;
    font-family: 'Poppins', sans-serif;
    background: radial-gradient(circle at top, #2e003e, #000);
    color: white;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  #particles-js {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 2; /* visible now */
  }

  .banner {
    width: 100%;
    height: 300px;
    background-image: url("https://yt3.googleusercontent.com/Y0q_0B3wtspINJiOTTrA4JUAZ80HZmupzIMbGpUPF78lbQ3RrmfAPIGOzWjJ8JiG37oWAuneYg=w1060-fcrop64=1,00005a57ffffa5a8-k-c0xffffffff-no-nd-rj");
    background-size: cover;
    background-position: center;
    box-shadow: 0 0 40px #a020f0;
    border-bottom: 3px solid #8a2be2;
    position: relative;
    z-index: 1;
  }

  .profile {
    text-align: center;
    margin-top: -80px;
    position: relative;
    z-index: 1;
  }

  .profile img {
    width: 160px;
    height: 160px;
    border-radius: 50%;
    border: 4px solid #8a2be2;
    box-shadow: 0 0 25px #a020f0;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
  }

  .profile img:hover {
    transform: scale(1.1);
    box-shadow: 0 0 40px #bf40bf;
  }

  .name {
    margin-top: 15px;
    font-size: 2.5rem;
    font-weight: 800;
    text-shadow: 0 0 10px #b84bff, 0 0 20px #9b30ff;
  }

  .links {
    margin-top: 30px;
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 20px;
    position: relative;
    z-index: 2;
  }

  .link {
    padding: 12px 25px;
    border-radius: 50px;
    background: linear-gradient(45deg, #4b0082, #9b30ff);
    color: white;
    font-weight: 600;
    text-decoration: none;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
  }

  .link::after {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: rgba(255,255,255,0.1);
    transform: skewX(-45deg);
    transition: left 0.3s ease;
  }

  .link:hover::after {
    left: 200%;
  }

  .link:hover {
    box-shadow: 0 0 20px #b84bff;
    transform: scale(1.05);
  }

  footer {
    margin-top: 60px;
    text-align: center;
    color: gray;
    font-size: 0.9rem;
    padding-bottom: 20px;
    position: relative;
    z-index: 1;
  }
</style>
</head>
<body>

<!-- Particles background -->
<div id="particles-js"></div>

<!-- Banner -->
<div class="banner"></div>

<!-- Profile section -->
<div class="profile">
  <img src="https://yt3.googleusercontent.com/RCy-uFzuQKOqwdtM8fWXhwRthXlVJO-Qd9eBmPdlWzYfiy7DkHWkfqlSGODViLPFIIEAeg09=s160-c-k-c0x00ffffff-no-rj" alt="NebulaTen's pfp">
  <div class="name">NebulaTen</div>
</div>

<!-- Links -->
<div class="links">
  <a href="https://www.youtube.com/@NebulaTen" target="_blank" class="link"><i class="fa-brands fa-youtube"></i> YouTube</a>
  <a href="https://nebula10.netlify.app/" target="_blank" class="link"><i class="fa-solid fa-globe"></i> Website</a>
</div>

<!-- Footer -->
<footer>HTML-JS:Five2357</footer>

<!-- Particles.js Script -->
<script src="https://cdn.jsdelivr.net/gh/VincentGarreau/particles.js/particles.min.js"></script>
<script>
document.addEventListener("DOMContentLoaded", () => {
  particlesJS("particles-js", {
    "particles": {
      "number": { "value": 80 },
      "color": { "value": "#a020f0" },
      "shape": { "type": "triangle" },
      "opacity": { "value": 0.5 },
      "size": { "value": 5 },
      "line_linked": { "enable": true, "distance": 150, "color": "#8a2be2", "opacity": 0.4, "width": 1 },
      "move": { "enable": true, "speed": 2 }
    },
    "interactivity": {
      "detect_on": "canvas",
      "events": {
        "onhover": { "enable": true, "mode": "grab" },
        "onclick": { "enable": true, "mode": "push" }
      }
    },
    "retina_detect": true
  });
});
</script>

</body>
</html>
