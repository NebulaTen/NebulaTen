<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevLogin - NebulaTen</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    background:linear-gradient(135deg,#2b1055,#4b1d95,#7c3aed);
    position:relative;
}

/* Animated Background */

body::before,
body::after{
    content:"";
    position:absolute;
    width:450px;
    height:450px;
    border-radius:50%;
    filter:blur(120px);
    opacity:.45;
    animation:float 10s ease-in-out infinite alternate;
}

body::before{
    background:#8b5cf6;
    top:-150px;
    left:-120px;
}

body::after{
    background:#c084fc;
    bottom:-170px;
    right:-120px;
    animation-delay:3s;
}

@keyframes float{
    from{
        transform:translateY(0px) translateX(0px);
    }
    to{
        transform:translateY(40px) translateX(30px);
    }
}

#container{
    width:400px;
    max-width:90%;
    padding:45px;
    border-radius:28px;

    background:rgba(255,255,255,.08);
    backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,.15);

    box-shadow:
    0 20px 60px rgba(0,0,0,.45),
    inset 0 1px 1px rgba(255,255,255,.08);

    text-align:center;
    color:white;
}

.lock{
    width:80px;
    height:80px;
    margin:auto;
    margin-bottom:20px;

    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;

    background:linear-gradient(135deg,#8b5cf6,#a855f7);

    font-size:34px;

    box-shadow:0 0 30px rgba(168,85,247,.45);
}

h2{
    font-size:28px;
    margin-bottom:8px;
}

p.subtitle{
    color:#d6c8ff;
    margin-bottom:30px;
    font-size:14px;
}

input{
    width:100%;
    padding:15px;
    border:none;
    outline:none;
    border-radius:14px;

    background:rgba(255,255,255,.08);
    color:white;
    font-size:16px;

    border:1px solid transparent;

    transition:.3s;
}

input::placeholder{
    color:#d5c6ff;
}

input:focus{
    border-color:#b794f4;
    box-shadow:0 0 20px rgba(168,85,247,.35);
}

button{
    margin-top:20px;
    width:100%;
    padding:15px;

    border:none;
    border-radius:14px;

    cursor:pointer;
    font-size:16px;
    font-weight:600;

    color:white;

    background:linear-gradient(135deg,#7c3aed,#9333ea);

    transition:.25s;
}

button:hover{
    transform:translateY(-3px);
    box-shadow:0 12px 35px rgba(147,51,234,.45);
}

#message{
    margin-top:16px;
    color:#ff9db2;
    min-height:22px;
    font-weight:500;
}

.success h1{
    font-size:36px;
    margin-bottom:12px;
    background:linear-gradient(90deg,#ffffff,#d8b4fe);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.success p{
    color:#ddd;
    line-height:1.6;
}

.fade{
    animation:fade .45s;
}

@keyframes fade{
    from{
        opacity:0;
        transform:translateY(15px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}
</style>
</head>

<body>

<div id="container"></div>

<script>

const correctHash="7f6b8d6f08d352f74877ed08a01903956f367be6339037d52a40db72ac1f4da8";

const passwordScreenContent=`
<div class="fade">
<div class="lock">🔒</div>

<h2>DevLogin</h2>

<p class="subtitle">
Enter your password to continue
</p>

<input
type="password"
id="password"
placeholder="Password"
autofocus>

<button id="submitBtn">
Unlock
</button>

<div id="message"></div>
</div>
`;

const successContent=`
<div class="success fade">

<div class="lock">
✅
</div>

<h1>Welcome!</h1>

<p>
The admin dashboard isn't ready yet.<br><br>
You can replace this entire section with any HTML you want.
</p>

</div>
`;

const container=document.getElementById("container");
container.innerHTML=passwordScreenContent;

async function hash(text){
const encoder=new TextEncoder();
const data=encoder.encode(text);
const hashBuffer=await crypto.subtle.digest("SHA-256",data);
const hashArray=Array.from(new Uint8Array(hashBuffer));
return hashArray.map(b=>b.toString(16).padStart(2,"0")).join("");
}

container.querySelector("#submitBtn").addEventListener("click",async()=>{

const input=container.querySelector("#password").value;
const message=container.querySelector("#message");

message.textContent="";

const hashedInput=await hash(input);

if(hashedInput===correctHash){

container.innerHTML=successContent;

}else{

message.textContent="Incorrect password.";

}

});

container.addEventListener("keydown",(e)=>{
if(e.key==="Enter"){
container.querySelector("#submitBtn").click();
}
});

</script>

</body>
</html>
