<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login • NebulaTen</title>

<link rel="stylesheet" href="css/variables.css">
<link rel="stylesheet" href="css/main.css">

<style>

body{

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

padding:20px;

background:
radial-gradient(circle at top right,
rgba(168,85,247,.15),
transparent 40%),
var(--bg);

}

.loginCard{

width:500px;

max-width:100%;

background:var(--card);

border:1px solid var(--border);

border-radius:24px;

padding:35px;

box-shadow:var(--shadow);

}

.logo{

text-align:center;

font-size:38px;

font-weight:bold;

color:var(--accent2);

margin-bottom:10px;

}

.subtitle{

text-align:center;

color:var(--text2);

margin-bottom:30px;

}

.tabs{

display:flex;

gap:10px;

margin-bottom:20px;

}

.tabs button{

flex:1;

padding:14px;

border-radius:12px;

background:var(--card2);

color:white;

border:none;

font-size:15px;

}

.tabs button.active{

background:var(--accent);

}

input{

width:100%;

padding:14px;

margin-bottom:15px;

background:var(--card2);

border:1px solid var(--border);

border-radius:12px;

color:white;

}

.passwordRow{

display:flex;

gap:10px;

}

.passwordRow input{

margin-bottom:0;

}

.passwordRow button{

width:60px;

border:none;

border-radius:12px;

background:var(--card2);

color:white;

}

#confirmContainer{

display:none;

}

.options{

display:flex;

justify-content:space-between;

align-items:center;

margin:18px 0;

font-size:14px;

}

.options a{

color:var(--accent2);

text-decoration:none;

}

.mainButton{

width:100%;

padding:15px;

border:none;

border-radius:12px;

background:var(--accent);

color:white;

font-size:16px;

font-weight:bold;

}

.mainButton:hover{

box-shadow:var(--shadow);

}

.message{

margin-top:20px;

text-align:center;

}

.error{

color:#ff8f8f;

}

.success{

color:#7ce38b;

}

@media(max-width:600px){

.loginCard{

padding:25px;

}

.logo{

font-size:30px;

}

}

</style>

</head>
<body>

<div class="loginCard">

<div class="logo">

NebulaTen

</div>

<div class="subtitle">

Sign in or create your account

</div>

<div class="tabs">

<button id="loginTab" class="active">

Login

</button>

<button id="signupTab">

Sign Up

</button>

</div>

<input
id="email"
type="email"
placeholder="Email">

<div class="passwordRow">

<input
id="password"
type="password"
placeholder="Password">

<button
type="button"
id="togglePassword">

👁

</button>

</div>

<div id="confirmContainer">

<input
id="confirmPassword"
type="password"
placeholder="Confirm Password">

</div>

<div class="options">

<label>

<input
type="checkbox"
id="remember"
checked>

 Remember this device

</label>

<a
href="#"
id="forgotPassword">

Forgot Password?

</a>

</div>

<button
id="submitButton"
class="mainButton">

Login

</button>

<div
id="message"
class="message">

</div>

</div>

<script>

togglePassword.onclick=()=>{

password.type=
password.type==="password"
?
"text"
:
"password";

};

forgotPassword.onclick=(e)=>{

e.preventDefault();

alert(
"Forgot Password will be connected in a later part."
);

};

</script>

<script type="module" src="js/auth.js"></script>

</body>
</html>
